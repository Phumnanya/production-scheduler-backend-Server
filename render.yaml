services:
  - type: web
    name: production-scheduler-backend
    runtime: python
    plan: free # or your plan level
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: your-database-name # Match this to your DB name in this file
          property: connectionString